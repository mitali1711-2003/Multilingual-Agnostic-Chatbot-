{% extends "base.html" %}

{% block title %}Register · Campus Chatbot{% endblock %}

{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="sub">Access the multilingual chatbot and (optionally) admin tools.</p>

    <form method="post" class="form">
      <div class="field-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required minlength="6" />
      </div>

      <label class="checkbox">
        <input type="checkbox" name="is_admin" />
        <span>Register as admin (for managing FAQs)</span>
      </label>

      <button class="btn-primary full" type="submit">Register</button>
      <p class="muted">
        Already have an account?
        <a href="{{ url_for('login') }}">Log in</a>
      </p>
    </form>
  </div>
</section>
{% endblock %}
